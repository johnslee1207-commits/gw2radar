name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  stage-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest httpx
      - name: Stage gate
        run: python harness/run_stage_gate.py stage
        timeout-minutes: 15
